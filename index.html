<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!--login/sign up screen-->
    <div class="auth-container" id="auth-screen">
        <h1>Welcome</h1>
        <!-- The Toggle Tabs -->
        <div class="auth-tabs">
            <button id="tab-login" class="active-tab">Login</button>
            <button id="tab-signup">Sign Up</button>
        </div>

        <!-- The Login Form -->
        <form id="login-form">
            <input type="email" id="login-email" placeholder="Email address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit" class="submit-btn" id="login-btn">Login</button>
        </form>

        <!-- The Signup Form (Hidden by default!) -->
        <form id="signup-form" class="hidden">
            <input type="email" id="signup-email" placeholder="Email address" required>
            <input type="password" id="signup-password" placeholder="Password (min 6 chars)" required>
            <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
        </form>

    </div>
    <div class="dashboard-container hidden" id="dashboard-screen">
        <h2 id="welcome-message"> Welcome to your dashboard !</h2>
        <button id="logout-btn">Logout</button>
    </div>
    <script src="./script.js"> </script>




</body>

</html>
